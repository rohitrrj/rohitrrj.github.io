---
layout: default
---
<article class="post-page">
  <div class="post-hero">
    <div class="container">
      <div class="post-meta-top">
        <a href="/blog/" class="back-link">← All Posts</a>
        <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
      </div>
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
      {% endif %}
      {% if page.tags %}
      <div class="post-tags">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>

  <div class="post-body">
    <div class="container">
      <div class="post-content">
        {{ content }}
      </div>

      <div class="post-footer">
        <div class="post-share">
          <span>Share:</span>
          <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener">X</a>
          <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener">LinkedIn</a>
        </div>
        <a href="/blog/" class="btn btn-outline">← Back to Blog</a>
      </div>
    </div>
  </div>
</article>
