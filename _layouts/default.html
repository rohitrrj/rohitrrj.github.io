<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <!-- SEO -->
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:creator" content="@{{ site.author.twitter }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  <!-- Feed -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">RJ<span class="accent">.</span></a>
      <div class="nav-links">
        <a href="/#about">About</a>
        <a href="/#work">Work</a>
        <a href="/#publications">Publications</a>
        <a href="/blog/">Blog</a>
        <a href="/#contact" class="nav-cta">Contact</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-name">Rohit Jadhav, PhD</p>
        <p class="footer-tagline">Senior Computational Biologist · Agentic AI · Translational Medicine</p>
        <div class="footer-links">
          <a href="https://linkedin.com/in/rohitjadhav1" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://github.com/rohitrrj" target="_blank" rel="noopener">GitHub</a>
          <a href="https://scholar.google.com/citations?user=r120a7QAAAAJ" target="_blank" rel="noopener">Scholar</a>
          <a href="https://orcid.org/0000-0002-2999-6329" target="_blank" rel="noopener">ORCID</a>
          <a href="https://twitter.com/rohitrrj" target="_blank" rel="noopener">X</a>
        </div>
        <p class="footer-copy">© {{ 'now' | date: "%Y" }} Rohit Jadhav. Built with intention.</p>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
